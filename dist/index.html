<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ella ORANGE Vol.2 단어 암기 카드</title>
  <style>
    :root{--orange:#ff8a1d;--orange2:#ffb347;--soft:#fff7ed;--ink:#2b2118;--muted:#7c5b42;--card:#fffdfa;--ok:#16a34a;--bad:#dc2626;--shadow:0 16px 36px rgba(137,76,8,.16)}
    [data-theme="dark"]{--soft:#1f1610;--ink:#fff7ed;--muted:#e8c7a4;--card:#2a211b;--shadow:0 16px 36px rgba(0,0,0,.35)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,var(--soft),#fff3d6);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} [data-theme="dark"] body{background:linear-gradient(135deg,#17100b,#2b1d12)}
    button{border:0;border-radius:18px;padding:12px 18px;font-size:17px;font-weight:800;cursor:pointer;background:#fff;color:var(--ink);box-shadow:0 8px 18px rgba(99,55,9,.12)} button.primary,.mode.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:white}.ghost{background:rgba(255,255,255,.68)}
    .app{min-height:100vh;display:grid;grid-template-columns:310px 1fr}.sidebar{padding:22px;background:rgba(255,255,255,.72);border-right:1px solid rgba(255,138,29,.22);backdrop-filter:blur(12px);overflow:auto}.brand{font-size:25px;font-weight:1000;line-height:1.15;margin:0 0 6px}.subtitle{color:var(--muted);font-weight:700;margin:0 0 18px}.set-list{display:grid;gap:10px}.set-btn{text-align:left;border:2px solid transparent;background:var(--card);width:100%;box-shadow:var(--shadow)}.set-btn.active{border-color:var(--orange)}.set-title{font-size:16px;font-weight:900}.set-meta{margin-top:7px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between}.bar{height:8px;background:#ffe0bd;border-radius:99px;overflow:hidden;margin-top:8px}.fill{height:100%;background:var(--orange);width:0%}
    .main{padding:22px;max-width:980px;width:100%;margin:0 auto}.topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px}.top-actions{display:flex;gap:10px}.menu{display:none}.notice{min-height:26px;color:var(--ok);font-weight:800}.hero,.panel{background:var(--card);border-radius:28px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}.hero h1{font-size:clamp(30px,6vw,52px);margin:0}.hero p{font-size:18px;color:var(--muted);font-weight:700}.modes{display:flex;gap:10px;flex-wrap:wrap}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{background:#fff3df;color:var(--muted);border-radius:999px;padding:8px 12px;font-weight:900}[data-theme="dark"] .pill{background:#49301d;color:#ffd7ad}
    .flash-card{min-height:330px;display:flex;align-items:center;justify-content:center;text-align:center;border:3px dashed #ffd19c;background:linear-gradient(180deg,#fff,#fff7ec);border-radius:30px;padding:36px;margin:18px 0;box-shadow:var(--shadow)}[data-theme="dark"] .flash-card{background:#33271e}.word-line,.meaning-line{display:inline-flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}.meaning-line{gap:8px}.big-word{font-size:clamp(42px,9vw,78px);font-weight:1000}.meaning-text{font-size:clamp(34px,7vw,62px);font-weight:1000}.pos-text{font-size:22px;color:var(--muted);font-weight:900;margin-top:10px}.speak,.choice-speak-button{min-width:auto;padding:7px 10px;font-size:14px;border-radius:999px}.tiny-speak-button{width:34px;height:34px;min-width:34px;padding:0;border-radius:999px;font-size:16px;line-height:1}.flashcard-actions,.quiz-actions,.assemble-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.hint{color:var(--muted);font-weight:800}.question-card{text-align:center}.choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}.choice{min-height:130px;border:3px solid transparent;background:var(--card)}.choice.correct{border-color:var(--ok);background:#dcfce7}.choice.wrong{border-color:var(--bad);background:#fee2e2}.choice-content{display:flex;align-items:center;justify-content:center;gap:10px}.choice-word{font-size:clamp(30px,7vw,46px);font-weight:900}.feedback{font-size:22px;font-weight:1000;min-height:34px}.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}
    .answer-box{min-height:62px;border:3px solid #ffd19c;border-radius:20px;padding:12px;font-size:32px;font-weight:1000;text-align:center;background:#fffaf2}.letter-bank-row{display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px;width:100%;margin-top:16px}.letter-tile{width:auto;min-width:48px;max-width:64px;height:48px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:22px;font-weight:900;background:#fff1d9}.letter-tile:disabled{opacity:.35}.review-list{display:grid;gap:10px}.review-item{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#fff7ed;border-radius:18px;padding:12px}.overlay{display:none}
    @media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:10;inset:0 auto 0 0;width:min(86vw,330px);transform:translateX(-105%);transition:.2s}.sidebar.open{transform:translateX(0)}.overlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9}.menu{display:inline-flex}.main{padding:14px}.topbar{align-items:flex-start}.choices{grid-template-columns:1fr}}
    @media(max-width:640px){button{font-size:16px}.flash-card{min-height:240px;padding:24px 16px;margin:10px 0 12px}.flashcard-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.flashcard-actions button{width:100%;min-height:44px;padding:9px 10px;font-size:16px}.hero,.panel{padding:16px;border-radius:22px}.big-word{font-size:clamp(38px,13vw,56px)}.letter-bank-row{display:flex!important;flex-direction:row!important;flex-wrap:wrap!important;justify-content:center!important;align-items:center!important;gap:10px!important}.letter-tile{width:auto!important;min-width:48px!important;max-width:64px!important;height:48px!important;flex:0 0 auto!important;display:inline-flex!important}}
  </style>
</head>
<body>
<div class="overlay" id="overlay"></div><div class="app"><aside class="sidebar" id="sidebar"><h2 class="brand">Ella ORANGE Vol.2<br>단어 암기 카드</h2><p class="subtitle" id="dataSummary">단어를 불러오는 중...</p><div class="set-list" id="setList"></div></aside><main class="main"><div class="topbar"><button class="menu" id="menuBtn">☰ 메뉴</button><div class="top-actions"><button id="themeBtn">🌙 다크모드</button><button id="copyBtn">🔗 링크 복사</button></div></div><div class="notice" id="notice"></div><section class="hero"><h1 id="title">Ella ORANGE Vol.2 단어 암기 카드</h1><p id="currentSetText"></p><div class="modes"><button class="mode active" data-mode="memorize">1단계 외우기</button><button class="mode" data-mode="choice">2단계 뜻 보고 고르기</button><button class="mode" data-mode="assemble">3단계 알파벳 조립</button><button class="mode" data-mode="review">다시 볼 카드</button></div><div class="stats" id="setStats"></div></section><section class="panel" id="content"></section></main></div>
<script>
const PUBLIC_URL='';const KEY='ella-orange-flashcard-clean-progress';let data, currentSet, mode='memorize', cardIndex=0, flipped=false, choiceState={}, assembleState={};let memoryStore={};
const $=s=>document.querySelector(s);const content=$('#content');
function safeStorage(){for(const s of [localStorage,sessionStorage]){try{s.setItem('__t','1');s.removeItem('__t');return s}catch{}}return{getItem:k=>memoryStore[k],setItem:(k,v)=>memoryStore[k]=v}}const store=safeStorage();
function loadProgress(){try{return JSON.parse(store.getItem(KEY)||'{}')}catch{return {}}}function saveProgress(p){store.setItem(KEY,JSON.stringify(p));renderSidebar();renderStats()}function ensureSet(p,setId){p[setId]??={known:[],review:[]};return p[setId]}function wordKey(w){return `${currentSet.setId}::${w.word}`}function pct(set){const p=ensureSet(loadProgress(),set.setId);return Math.round((p.known.length/set.words.length)*100)}
function speak(w,e){e?.stopPropagation();if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w.speakText);u.lang='en-US';u.rate=.85;window.speechSynthesis.speak(u)}
function shuffle(a){return [...a].map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function cleanWord(w){return w.word.toLowerCase().replace(/[^a-z]/g,'')}
function addReview(w){const p=loadProgress(),sp=ensureSet(p,currentSet.setId),k=wordKey(w);if(!sp.review.includes(k))sp.review.push(k);saveProgress(p)}function markKnown(w){const p=loadProgress(),sp=ensureSet(p,currentSet.setId),k=wordKey(w);if(!sp.known.includes(k))sp.known.push(k);sp.review=sp.review.filter(x=>x!==k);saveProgress(p)}
function renderSidebar(){const p=loadProgress();$('#dataSummary').textContent=`${data.sets.length}개 세트 · ${data.totalWords}개 단어`;$('#setList').innerHTML=data.sets.map(s=>{const sp=ensureSet(p,s.setId),percent=pct(s);return `<button class="set-btn ${currentSet?.setId===s.setId?'active':''}" data-set="${s.setId}"><div class="set-title">${s.title}</div><div class="set-meta"><span>${s.wordCount}개 단어</span><span>${percent}% 완료</span></div><div class="bar"><div class="fill" style="width:${percent}%"></div></div></button>`}).join('');document.querySelectorAll('.set-btn').forEach(b=>b.onclick=()=>{currentSet=data.sets.find(s=>s.setId===b.dataset.set);cardIndex=0;resetMode();closeMenu();render()})}
function renderStats(){const p=ensureSet(loadProgress(),currentSet.setId);$('#currentSetText').textContent=currentSet.title;$('#setStats').innerHTML=`<span class="pill">${currentSet.wordCount}개 단어</span><span class="pill">외운 카드 ${p.known.length}개</span><span class="pill">다시 볼 카드 ${p.review.length}개</span><span class="pill">진행률 ${pct(currentSet)}%</span>`}
function resetMode(){flipped=false;choiceState={index:0,score:0,wrong:[],answered:false,pool:currentSet.words};assembleState={index:0,score:0,wrong:[],picked:[],used:[],done:false,letters:[]}}
function render(){renderSidebar();renderStats();document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));({memorize:renderMemorize,choice:renderChoice,assemble:renderAssemble,review:renderReview})[mode]()}
function renderMemorize(){const w=currentSet.words[cardIndex];const p=ensureSet(loadProgress(),currentSet.setId);content.innerHTML=`<div class="hint">${cardIndex+1} / ${currentSet.words.length} · 카드를 누르면 뒤집혀요</div><div class="flash-card" id="flashCard">${!flipped?`<div><div class="word-line"><span class="big-word">${w.word}</span><button class="speak" aria-label="발음 듣기">🔊</button></div></div>`:`<div><div class="meaning-text">${w.meaningKo}</div><div class="word-line"><span class="big-word">${w.word}</span><button class="speak" aria-label="발음 듣기">🔊</button></div><div class="pos-text">${w.partOfSpeechKo}</div></div>`}</div><div class="stats"><span class="pill">외운 카드 ${p.known.length}</span><span class="pill">다시 볼 카드 ${p.review.length}</span></div><div class="flashcard-actions"><button id="prev">이전 카드</button><button id="next">다음 카드</button><button class="primary" id="known">외웠어요</button><button id="again">다시 볼래요</button></div>`;$('#flashCard').onclick=()=>{flipped=!flipped;renderMemorize()};$('.speak').onclick=e=>speak(w,e);$('#prev').onclick=()=>{cardIndex=(cardIndex-1+currentSet.words.length)%currentSet.words.length;flipped=false;render()};$('#next').onclick=()=>{cardIndex=(cardIndex+1)%currentSet.words.length;flipped=false;render()};$('#known').onclick=()=>{markKnown(w);cardIndex=(cardIndex+1)%currentSet.words.length;flipped=false;render()};$('#again').onclick=()=>{addReview(w);cardIndex=(cardIndex+1)%currentSet.words.length;flipped=false;render()}}
function renderChoice(done=false){const st=choiceState;if(done||st.index>=st.pool.length){return result('뜻 보고 고르기',st)}const w=st.pool[st.index], wrong=shuffle(currentSet.words.filter(x=>x.word!==w.word))[0], choices=shuffle([w,wrong]);content.innerHTML=`<div class="hint">${st.index+1} / ${st.pool.length}</div><div class="question-card"><div class="meaning-text">${w.meaningKo}</div><div class="pos-text">${w.partOfSpeechKo}</div></div><div class="choices">${choices.map(c=>`<button class="choice ${st.answered?(c.word===w.word?'correct':(choiceState.selected===c.word?'wrong':'')):''}" data-word="${c.word}"><span class="choice-content"><span class="choice-word">${c.word}</span><span class="choice-speak-button" role="button" aria-label="발음 듣기">🔊</span></span></button>`).join('')}</div><div class="feedback ${st.ok?'ok':st.answered?'bad':''}">${st.answered?(st.ok?'정답입니다!':`아쉬워요. 정답은 ${w.word}입니다.`):''}</div><div class="quiz-actions"><button class="primary" id="nextQ" ${st.answered?'':'disabled'}>다음 문제</button></div>`;document.querySelectorAll('.choice').forEach(b=>{b.onclick=()=>{if(st.answered)return;st.answered=true;st.selected=b.dataset.word;st.ok=b.dataset.word===w.word;if(st.ok)st.score++;else{st.wrong.push(w);addReview(w)}renderChoice()};b.querySelector('.choice-speak-button').onclick=e=>speak(choices.find(c=>c.word===b.dataset.word),e)});$('#nextQ').onclick=()=>{st.index++;st.answered=false;st.ok=false;renderChoice()}}
function startAssemblePool(pool){assembleState={index:0,score:0,wrong:[],picked:[],used:[],done:false,pool,letters:[]};prepLetters();renderAssemble()}function prepLetters(){const w=(assembleState.pool||currentSet.words)[assembleState.index];assembleState.letters=shuffle(cleanWord(w).split('').map((ch,i)=>({ch,i})));assembleState.picked=[];assembleState.used=[];assembleState.done=false}
function renderAssemble(done=false){const st=assembleState;st.pool??=currentSet.words;if(done||st.index>=st.pool.length){return result('알파벳 조립',st,true)}const w=st.pool[st.index];if(!st.letters.length)prepLetters();content.innerHTML=`<div class="hint">${st.index+1} / ${st.pool.length}</div><div class="question-card"><div class="meaning-line"><span class="meaning-text">${w.meaningKo}</span><button class="tiny-speak-button" aria-label="발음 듣기">🔊</button></div><div class="pos-text">${w.partOfSpeechKo}</div></div><div class="answer-box">${st.picked.join('')||'_'}</div><div class="letter-bank-row">${st.letters.map(l=>`<button class="letter-tile" data-i="${l.i}" ${st.used.includes(l.i)||st.done?'disabled':''}>${l.ch}</button>`).join('')}</div><div class="feedback ${st.ok?'ok':st.done?'bad':''}">${st.done?(st.ok?'정답입니다!':`아쉬워요. 정답은 ${w.word}입니다.`):''}</div><div class="assemble-actions"><button id="back">지우기</button><button id="clear">초기화</button><button class="primary" id="check">정답 확인</button><button id="nextA">다음 카드</button></div>`;$('.tiny-speak-button').onclick=e=>speak(w,e);document.querySelectorAll('.letter-tile').forEach(b=>b.onclick=()=>{const l=st.letters.find(x=>x.i==b.dataset.i);st.picked.push(l.ch);st.used.push(l.i);renderAssemble()});$('#back').onclick=()=>{st.picked.pop();st.used.pop();renderAssemble()};$('#clear').onclick=()=>{st.picked=[];st.used=[];renderAssemble()};$('#check').onclick=()=>{st.done=true;st.ok=st.picked.join('').toLowerCase()===cleanWord(w);if(st.ok)st.score++;else{st.wrong.push(w);addReview(w)}renderAssemble()};$('#nextA').onclick=()=>{st.index++;prepLetters();renderAssemble()}}
function result(name,st,assemble=false){const total=st.pool.length, wrong=st.wrong.length, rate=Math.round((st.score/total)*100);content.innerHTML=`<h2>${name} 완료!</h2><div class="stats"><span class="pill">정답 ${st.score}</span><span class="pill">오답 ${wrong}</span><span class="pill">정답률 ${rate}%</span></div><h3>틀린 단어</h3><div class="review-list">${wrong?st.wrong.map(w=>`<div class="review-item"><strong>${w.word}</strong><span>${w.meaningKo} · ${w.partOfSpeechKo}</span></div>`).join(''):'<p class="hint">틀린 단어가 없어요!</p>'}</div><p><button class="primary" id="retry" ${wrong?'':'disabled'}>${assemble?'틀린 단어만 다시 조립하기':'틀린 단어만 다시 풀기'}</button></p>`;$('#retry').onclick=()=>assemble?startAssemblePool(st.wrong):(choiceState={index:0,score:0,wrong:[],answered:false,pool:st.wrong},renderChoice())}
function renderReview(){const p=ensureSet(loadProgress(),currentSet.setId);const words=currentSet.words.filter(w=>p.review.includes(wordKey(w)));content.innerHTML=`<h2>다시 볼 카드</h2>${words.length?'':'<p class="hint">다시 볼 카드가 없어요.</p>'}<div class="review-list">${words.map(w=>`<div class="review-item"><div><strong>${w.word}</strong><br><span>${w.meaningKo} · ${w.partOfSpeechKo}</span></div><div><button class="speak" data-word="${w.word}" aria-label="발음 듣기">🔊</button><button class="primary known-review" data-word="${w.word}">외웠어요</button></div></div>`).join('')}</div>`;document.querySelectorAll('.known-review').forEach(b=>b.onclick=()=>{markKnown(words.find(w=>w.word===b.dataset.word));renderReview()});document.querySelectorAll('.speak').forEach(b=>b.onclick=e=>speak(words.find(w=>w.word===b.dataset.word),e))}
function closeMenu(){$('#sidebar').classList.remove('open');$('#overlay').classList.remove('open')}$('#menuBtn').onclick=()=>{$('#sidebar').classList.add('open');$('#overlay').classList.add('open')};$('#overlay').onclick=closeMenu;$('#themeBtn').onclick=()=>{const dark=document.documentElement.dataset.theme==='dark';document.documentElement.dataset.theme=dark?'':'dark'};$('#copyBtn').onclick=async()=>{const url=PUBLIC_URL||location.href;await navigator.clipboard?.writeText(url).catch(()=>{});$('#notice').textContent='링크가 복사되었습니다.';setTimeout(()=>$('#notice').textContent='',2200)};document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;resetMode();render()});
fetch('quizData.json').then(r=>r.json()).then(j=>{data=j;currentSet=data.sets[0];resetMode();render()}).catch(e=>{content.innerHTML=`<p class="feedback bad">quizData.json 파싱 오류: ${e.message}</p>`});
</script>
</body>
</html>
