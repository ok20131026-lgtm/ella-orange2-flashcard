  <style>

    button{border:0;border-radius:18px;padding:12px 18px;font-size:17px;font-weight:800;cursor:pointer;background:#fff;color:var(--ink);box-shadow:0 8px 18px rgba(99,55,9,.12)} button.primary,.mode.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:white}.ghost{background:rgba(255,255,255,.68)}
    .app{min-height:100vh;display:grid;grid-template-columns:310px 1fr}.sidebar{padding:22px;background:rgba(255,255,255,.72);border-right:1px solid rgba(255,138,29,.22);backdrop-filter:blur(12px);overflow:auto}.brand{font-size:25px;font-weight:1000;line-height:1.15;margin:0 0 6px}.subtitle{color:var(--muted);font-weight:700;margin:0 0 18px}.set-list{display:grid;gap:10px}.set-btn{text-align:left;border:2px solid transparent;background:var(--card);width:100%;box-shadow:var(--shadow)}.set-btn.active{border-color:var(--orange)}.set-title{font-size:16px;font-weight:900}.set-meta{margin-top:7px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between}.bar{height:8px;background:#ffe0bd;border-radius:99px;overflow:hidden;margin-top:8px}.fill{height:100%;background:var(--orange);width:0%}
    .main{padding:22px;max-width:980px;width:100%;margin:0 auto}.topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px}.top-actions{display:flex;gap:10px}.menu{display:none}.notice{min-height:26px;color:var(--ok);font-weight:800}.hero,.panel{background:var(--card);border-radius:28px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}.hero h1{font-size:clamp(30px,6vw,52px);margin:0}.hero p{font-size:18px;color:var(--muted);font-weight:700}.modes{display:flex;gap:10px;flex-wrap:wrap}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{background:#fff3df;color:var(--muted);border-radius:999px;padding:8px 12px;font-weight:900}[data-theme="dark"] .pill{background:#49301d;color:#ffd7ad}
    .flash-card{min-height:330px;display:flex;align-items:center;justify-content:center;text-align:center;border:3px dashed #ffd19c;background:linear-gradient(180deg,#fff,#fff7ec);border-radius:30px;padding:36px;margin:18px 0;box-shadow:var(--shadow)}[data-theme="dark"] .flash-card{background:#33271e}.word-line,.meaning-line{display:inline-flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}.meaning-line{gap:8px}.big-word{font-size:clamp(42px,9vw,78px);font-weight:1000}.meaning-text{font-size:clamp(34px,7vw,62px);font-weight:1000}.pos-text{font-size:22px;color:var(--muted);font-weight:900;margin-top:10px}.speak,.choice-speak-button{min-width:auto;padding:7px 10px;font-size:14px;border-radius:999px}.tiny-speak-button{width:34px;height:34px;min-width:34px;padding:0;border-radius:999px;font-size:16px;line-height:1}.flashcard-actions,.quiz-actions,.assemble-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.hint{color:var(--muted);font-weight:800}.question-card{text-align:center}.choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}.choice{min-height:130px;border:3px solid transparent;background:var(--card)}.choice.correct{border-color:var(--ok);background:#dcfce7}.choice.wrong{border-color:var(--bad);background:#fee2e2}.choice-content{display:flex;align-items:center;justify-content:center;gap:10px}.choice-word{font-size:clamp(30px,7vw,46px);font-weight:900}.feedback{font-size:22px;font-weight:1000;min-height:34px}.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}
    .answer-box{min-height:62px;border:3px solid #ffd19c;border-radius:20px;padding:12px;font-size:32px;font-weight:1000;text-align:center;background:#fffaf2}.letter-bank-row{display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px;width:100%;margin-top:16px}.letter-tile{width:auto;min-width:48px;max-width:64px;height:48px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:22px;font-weight:900;background:#fff1d9}.letter-tile:disabled{opacity:.35}.review-list{display:grid;gap:10px}.review-item{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#fff7ed;border-radius:18px;padding:12px}.stage-results{display:grid;gap:8px;margin-top:14px}.stage-line{background:#fff3df;border-radius:16px;padding:10px 12px;font-weight:900;color:var(--muted)}.mode-badge{display:inline-flex;align-items:center;gap:8px;background:#fff3df;color:var(--muted);border-radius:999px;padding:8px 12px;font-weight:1000;margin-bottom:10px}.danger{background:#fee2e2;color:#991b1b}.speech-help{color:var(--bad);font-weight:900;min-height:24px;text-align:center}.overlay{display:none}
    @media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:10;inset:0 auto 0 0;width:min(86vw,330px);transform:translateX(-105%);transition:.2s}.sidebar.open{transform:translateX(0)}.overlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9}.menu{display:inline-flex}.main{padding:14px}.topbar{align-items:flex-start}.choices{grid-template-columns:1fr}}
    @media(max-width:640px){button{font-size:16px}.question-card,.choice-card-wrap,.quiz-card{padding:22px 16px;margin:10px 0}.meaning-text,.question-meaning{font-size:clamp(38px,10vw,56px);line-height:1.05;margin-bottom:6px}.pos-text,.part-text{font-size:22px;margin:4px 0 14px}.choice-list,.choices{gap:12px;margin:10px 0}.choice-card,.choice{min-height:96px;padding:18px 14px}.choice-word{font-size:clamp(32px,8vw,48px);line-height:1.05}.choice-speak-button{width:34px;height:34px;min-width:34px;padding:0;font-size:15px}.next-button,.primary-action{min-height:52px;padding:12px 22px;margin-top:18px}.flash-card{min-height:240px;padding:24px 16px;margin:10px 0 12px}.flashcard-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.flashcard-actions button{width:100%;min-height:44px;padding:9px 10px;font-size:16px}.hero,.panel{padding:16px;border-radius:22px}.big-word{font-size:clamp(38px,13vw,56px)}.letter-bank-row{display:flex!important;flex-direction:row!important;flex-wrap:wrap!important;justify-content:center!important;align-items:center!important;gap:10px!important}.letter-tile{width:auto!important;min-width:48px!important;max-width:64px!important;height:48px!important;flex:0 0 auto!important;display:inline-flex!important}}
  </style>

<body>
<div class="overlay" id="overlay"></div><div class="app"><aside class="sidebar" id="sidebar"><h2 class="brand">Ella ORANGE Vol.2<br>단어 암기 카드</h2><p class="subtitle" id="dataSummary">단어를 불러오는 중...</p><div class="set-list" id="setList"></div></aside><main class="main"><div class="topbar"><button class="menu" id="menuBtn">☰ 메뉴</button><div class="top-actions"><button id="themeBtn">🌙 다크모드</button><button id="copyBtn">🔗 링크 복사</button></div></div><div class="notice" id="notice"></div><section class="hero"><h1 id="title">Ella ORANGE Vol.2 단어 암기 카드</h1><p id="currentSetText"></p><div class="modes"><button class="mode active" data-mode="memorize">1단계 외우기</button><button class="mode" data-mode="choice">2단계 뜻 보고 고르기</button><button class="mode" data-mode="assemble">3단계 알파벳 조립</button><button class="mode" data-mode="review">다시 볼 카드</button></div><div class="stats" id="setStats"></div></section><section class="panel" id="content"></section></main></div>
<script>
const PUBLIC_URL='__PUBLIC_URL__';
const KEY='ella-orange-flashcard-clean-progress';
const SCORE_KEY='ella-orange-flashcard-stage-scores';
const REVIEW_KEY='ella-orange-flashcard-stage-review';
let data,currentSet,mode='memorize',cardIndex=0,flipped=false,choiceState={},assembleState={},memoryStore={},cachedVoices=[],audioContext;
const $=s=>document.querySelector(s),content=$('#content');
function safeStorage(){for(const s of [localStorage,sessionStorage]){try{s.setItem('__t','1');s.removeItem('__t');return s}catch{}}return{getItem:k=>memoryStore[k],setItem:(k,v)=>memoryStore[k]=v}}
const store=safeStorage(),readJSON=(k,d={})=>{try{return JSON.parse(store.getItem(k)||JSON.stringify(d))}catch{return d}},writeJSON=(k,v)=>store.setItem(k,JSON.stringify(v));
function loadProgress(){return readJSON(KEY,{})}function saveProgress(p){writeJSON(KEY,p);renderSidebar();renderStats()}function loadScores(){return readJSON(SCORE_KEY,{})}function saveScores(s){writeJSON(SCORE_KEY,s);renderSidebar();renderStats()}function loadStageReview(){return readJSON(REVIEW_KEY,{})}function saveStageReview(r){writeJSON(REVIEW_KEY,r);renderSidebar();renderStats()}
function ensureSet(p,setId){p[setId]??={known:[],review:[]};return p[setId]}function wordKey(w,setId=currentSet.setId){return `${setId}::${w.word}`}function reviewKey(setId,stage,w){return `${setId}::${stage}::${w.word}`}
function pctVal(c,t){return t?Math.round(c/t*100):0}function pct(set){const p=ensureSet(loadProgress(),set.setId);return pctVal(p.known.length,set.words.length)}
function setScore(stage,correct,total){const s=loadScores();s[currentSet.setId]??={};s[currentSet.setId][stage]={correct,total,updatedAt:Date.now()};saveScores(s)}function getScore(setId,stage){return loadScores()[setId]?.[stage]}
function getStageReviewWords(setId,stage){return loadStageReview()[setId]?.[stage]||[]}function reviewCount(setId,stage){return getStageReviewWords(setId,stage).length}
function addStageReview(w,stage){const r=loadStageReview();r[currentSet.setId]??={};r[currentSet.setId][stage]??=[];const k=reviewKey(currentSet.setId,stage,w);if(!r[currentSet.setId][stage].includes(k))r[currentSet.setId][stage].push(k);saveStageReview(r)}
function removeStageReview(w,stage){const r=loadStageReview();r[currentSet.setId]??={};r[currentSet.setId][stage]=(r[currentSet.setId][stage]||[]).filter(k=>k!==reviewKey(currentSet.setId,stage,w));saveStageReview(r)}
function scoreText(setId,stage,label){const s=getScore(setId,stage);return s?`${label}: ${s.correct} / ${s.total}개 · ${pctVal(s.correct,s.total)}%`:`${label}: 아직 기록 없음`}
function stageResultsHTML(){return `<div class="stage-results"><h3>단계별 결과</h3><div class="stage-line">${scoreText(currentSet.setId,'stage1','1단계 외우기')} · 다시 볼 카드 ${reviewCount(currentSet.setId,'stage1')}개</div><div class="stage-line">${scoreText(currentSet.setId,'stage2','2단계 뜻 보고 고르기')} · 오답 ${reviewCount(currentSet.setId,'stage2')}개</div><div class="stage-line">${scoreText(currentSet.setId,'stage3','3단계 알파벳 조립')} · 오답 ${reviewCount(currentSet.setId,'stage3')}개</div><p><button class="danger" id="resetResults">결과 초기화</button></p></div>`}
function bindReset(){const b=$('#resetResults');if(b)b.onclick=()=>{if(!confirm('현재 Unit-Lesson의 학습 결과와 복습 목록을 모두 초기화할까요?'))return;const sc=loadScores(),rv=loadStageReview(),pr=loadProgress();delete sc[currentSet.setId];delete rv[currentSet.setId];delete pr[currentSet.setId];saveScores(sc);saveStageReview(rv);saveProgress(pr);resetMode();render()}}
function refreshVoices(){if('speechSynthesis'in window)cachedVoices=window.speechSynthesis.getVoices()||[]}if('speechSynthesis'in window){refreshVoices();window.speechSynthesis.onvoiceschanged=refreshVoices}
function speakWord(text,e,retry=false){e?.stopPropagation();if(!('speechSynthesis'in window))return showSpeechHelp();refreshVoices();const synth=window.speechSynthesis;synth.cancel();setTimeout(()=>{try{const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.85;u.voice=cachedVoices.find(v=>v.lang==='en-US')||cachedVoices.find(v=>v.lang?.startsWith('en'))||cachedVoices.find(v=>/English/i.test(v.name))||null;u.onerror=()=>{if(!retry)speakWord(text,e,true);else showSpeechHelp()};synth.speak(u)}catch{if(!retry)speakWord(text,e,true);else showSpeechHelp()}},retry?90:70)}
function showSpeechHelp(){$('#notice').textContent='발음 재생이 안 되면 Chrome 브라우저에서 다시 열어 주세요.';setTimeout(()=>$('#notice').textContent='',4500)}
function playTone(ok=true){try{audioContext??=new (window.AudioContext||window.webkitAudioContext)();audioContext.resume?.();const now=audioContext.currentTime,tones=ok?[[660,0,.11],[880,.13,.14]]:[[220,0,.2]];tones.forEach(([f,d,dur])=>{const o=audioContext.createOscillator(),g=audioContext.createGain();o.frequency.value=f;o.type=ok?'sine':'square';g.gain.setValueAtTime(.0001,now+d);g.gain.exponentialRampToValueAtTime(.08,now+d+.02);g.gain.exponentialRampToValueAtTime(.0001,now+d+dur);o.connect(g).connect(audioContext.destination);o.start(now+d);o.stop(now+d+dur+.03)})}catch{}}
function shuffle(a){return [...a].map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function cleanWord(w){return w.word.toLowerCase().replace(/[^a-z]/g,'')}
function addReview(w){addStageReview(w,'stage1');const p=loadProgress(),sp=ensureSet(p,currentSet.setId),k=wordKey(w);sp.known=sp.known.filter(x=>x!==k);if(!sp.review.includes(k))sp.review.push(k);saveProgress(p);setScore('stage1',sp.known.length,currentSet.words.length)}
function markKnown(w){removeStageReview(w,'stage1');const p=loadProgress(),sp=ensureSet(p,currentSet.setId),k=wordKey(w);if(!sp.known.includes(k))sp.known.push(k);sp.review=sp.review.filter(x=>x!==k);saveProgress(p);setScore('stage1',sp.known.length,currentSet.words.length)}
function reviewWords(stage){const keys=getStageReviewWords(currentSet.setId,stage);return currentSet.words.filter(w=>keys.includes(reviewKey(currentSet.setId,stage,w)))}
function renderSidebar(){const p=loadProgress();$('#dataSummary').textContent=`${data.sets.length}개 세트 · ${data.totalWords}개 단어`;$('#setList').innerHTML=data.sets.map(s=>{const s1=getScore(s.setId,'stage1'),s2=getScore(s.setId,'stage2'),s3=getScore(s.setId,'stage3'),percent=pct(s);return `<button class="set-btn ${currentSet?.setId===s.setId?'active':''}" data-set="${s.setId}"><div class="set-title">${s.title}</div><div class="set-meta"><span>${s.wordCount}개 단어</span><span>${percent}% 완료</span></div><div class="set-meta"><span>1단계 ${s1?pctVal(s1.correct,s1.total)+'%':'-'}</span><span>2단계 ${s2?pctVal(s2.correct,s2.total)+'%':'-'} · 3단계 ${s3?pctVal(s3.correct,s3.total)+'%':'-'}</span></div><div class="bar"><div class="fill" style="width:${percent}%"></div></div></button>`}).join('');document.querySelectorAll('.set-btn').forEach(b=>b.onclick=()=>{currentSet=data.sets.find(s=>s.setId===b.dataset.set);cardIndex=0;resetMode();closeMenu();render()})}
function renderStats(){const p=ensureSet(loadProgress(),currentSet.setId);$('#currentSetText').textContent=currentSet.title;$('#setStats').innerHTML=`<span class="pill">${currentSet.wordCount}개 단어</span><span class="pill">외운 카드 ${p.known.length}개</span><span class="pill">다시 볼 카드 ${reviewCount(currentSet.setId,'stage1')}개</span><span class="pill">진행률 ${pct(currentSet)}%</span>`}
function resetMode(){flipped=false;choiceState={index:0,score:0,wrong:[],answered:false,pool:currentSet.words,review:false,recorded:{}};assembleState={index:0,score:0,wrong:[],picked:[],used:[],done:false,pool:currentSet.words,letters:[],review:false,recorded:{},locked:false,message:''}}
function render(){renderSidebar();renderStats();document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));({memorize:renderMemorize,choice:renderChoice,assemble:renderAssemble,review:renderMemorize})[mode]();bindReset()}
function renderMemorize(){const pool=choiceState.review?reviewWords('stage1'):currentSet.words;if(pool.length===0&&choiceState.review){content.innerHTML=`<div class="mode-badge">1단계 복습 완료</div><p class="hint">복습할 카드 없음</p><p><button id="all">전체 문제로 돌아가기</button></p>${stageResultsHTML()}`;$('#all').onclick=()=>{choiceState.review=false;cardIndex=0;render()};bindReset();return}if(cardIndex>=pool.length)cardIndex=0;const w=pool[cardIndex],p=ensureSet(loadProgress(),currentSet.setId);content.innerHTML=`${choiceState.review?'<div class="mode-badge">1단계 다시 볼 카드 복습 중</div><button id="all">전체 문제로 돌아가기</button>':''}<div class="hint">${cardIndex+1} / ${pool.length} · 카드를 누르면 뒤집혀요</div><div class="flash-card" id="flashCard">${!flipped?`<div><div class="word-line"><span class="big-word">${w.word}</span><button class="speak" aria-label="발음 듣기">🔊</button></div></div>`:`<div><div class="meaning-text">${w.meaningKo}</div><div class="word-line"><span class="big-word">${w.word}</span><button class="speak" aria-label="발음 듣기">🔊</button></div><div class="pos-text">${w.partOfSpeechKo}</div></div>`}</div><div class="stats"><span class="pill">외운 카드 ${p.known.length}</span><span class="pill">다시 볼 카드 ${reviewCount(currentSet.setId,'stage1')}</span></div><div class="flashcard-actions"><button id="prev">이전 카드</button><button id="next">다음 카드</button><button class="primary" id="known">외웠어요</button><button id="again">다시 볼래요</button><button id="stage1Review" ${reviewWords('stage1').length?'':'disabled'}>1단계 다시 볼 카드 복습</button></div>${stageResultsHTML()}`;$('#flashCard').onclick=()=>{flipped=!flipped;renderMemorize()};document.querySelectorAll('.speak').forEach(b=>b.onclick=e=>speakWord(w.speakText||w.word,e));$('#prev').onclick=()=>{cardIndex=(cardIndex-1+pool.length)%pool.length;flipped=false;render()};$('#next').onclick=()=>{cardIndex=(cardIndex+1)%pool.length;flipped=false;render()};$('#known').onclick=()=>{markKnown(w);cardIndex=(cardIndex+1)%Math.max(1,pool.length);flipped=false;render()};$('#again').onclick=()=>{addReview(w);cardIndex=(cardIndex+1)%pool.length;flipped=false;render()};$('#stage1Review').onclick=()=>{choiceState.review=true;cardIndex=0;flipped=false;render()};const all=$('#all');if(all)all.onclick=()=>{choiceState.review=false;cardIndex=0;render()};bindReset()}
function startChoiceReview(){choiceState={index:0,score:0,wrong:[],answered:false,pool:reviewWords('stage2'),review:true,recorded:{}};renderChoice()}
function renderChoice(done=false){const st=choiceState;if(done||st.index>=st.pool.length){if(!st.review)setScore('stage2',st.score,st.pool.length);return result(st.review?'2단계 오답 복습':'뜻 보고 고르기',st,false)}const w=st.pool[st.index],wrong=shuffle(currentSet.words.filter(x=>x.word!==w.word))[0],choices=st.choices||shuffle([w,wrong]);st.choices=choices;content.innerHTML=`${st.review?'<div class="mode-badge">2단계 오답 복습 중</div><button id="all">전체 문제로 돌아가기</button>':''}<div class="hint">${st.index+1} / ${st.pool.length}</div><div class="question-card"><div class="meaning-text">${w.meaningKo}</div><div class="pos-text">${w.partOfSpeechKo}</div></div><div class="choices">${choices.map(c=>`<button class="choice ${st.answered?(c.word===w.word?'correct':(st.selected===c.word?'wrong':'')):''}" data-word="${c.word}"><span class="choice-content"><span class="choice-word">${c.word}</span><span class="choice-speak-button" role="button" aria-label="발음 듣기">🔊</span></span></button>`).join('')}</div><div class="feedback ${st.ok?'ok':st.answered?'bad':''}">${st.answered?(st.ok?'정답입니다!':`아쉬워요. 정답은 ${w.word}입니다.`):''}</div><div class="quiz-actions"><button id="choiceReview" ${reviewWords('stage2').length?'':'disabled'}>2단계 오답만 다시 풀기</button><button class="primary next-button" id="nextQ" ${st.answered?'':'disabled'}>다음 문제</button></div>${stageResultsHTML()}`;document.querySelectorAll('.choice').forEach(b=>{b.onclick=()=>{if(st.answered)return;st.answered=true;st.selected=b.dataset.word;st.ok=b.dataset.word===w.word;if(!st.recorded[w.word]){st.recorded[w.word]=true;if(st.ok){st.score++;removeStageReview(w,'stage2')}else{st.wrong.push(w);addStageReview(w,'stage2')}}renderChoice()};b.querySelector('.choice-speak-button').onclick=e=>speakWord(choices.find(c=>c.word===b.dataset.word).speakText||b.dataset.word,e)});$('#nextQ').onclick=()=>{st.index++;st.answered=false;st.ok=false;st.selected='';st.choices=null;renderChoice()};$('#choiceReview').onclick=startChoiceReview;const all=$('#all');if(all)all.onclick=()=>{resetMode();mode='choice';render()};bindReset()}
function startAssembleReview(){assembleState={index:0,score:0,wrong:[],picked:[],used:[],done:false,pool:reviewWords('stage3'),letters:[],review:true,recorded:{},locked:false,message:''};prepLetters();renderAssemble()}
function prepLetters(){const w=assembleState.pool[assembleState.index];assembleState.letters=shuffle(cleanWord(w).split('').map((ch,i)=>({ch,i})));assembleState.picked=[];assembleState.used=[];assembleState.done=false;assembleState.locked=false;assembleState.message=''}
function gradeAssemble(){const st=assembleState,w=st.pool[st.index];if(st.locked)return;st.done=true;st.ok=st.picked.join('').toLowerCase()===cleanWord(w);if(!st.recorded[w.word]){st.recorded[w.word]=true;if(st.ok){st.score++;removeStageReview(w,'stage3')}else{st.wrong.push(w);addStageReview(w,'stage3')}}if(st.ok){st.locked=true;st.message='정답입니다!';playTone(true);renderAssemble();setTimeout(()=>{st.index++;if(st.index>=st.pool.length){if(!st.review)setScore('stage3',st.score,st.pool.length);result(st.review?'3단계 오답 복습':'알파벳 조립',st,true)}else{prepLetters();renderAssemble()}},750)}else{st.message='아쉬워요. 다시 조립해 보세요.';playTone(false);renderAssemble()}}
function renderAssemble(done=false){const st=assembleState;if(done||st.index>=st.pool.length){if(!st.review)setScore('stage3',st.score,st.pool.length);return result(st.review?'3단계 오답 복습':'알파벳 조립',st,true)}const w=st.pool[st.index];if(!st.letters.length)prepLetters();content.innerHTML=`${st.review?'<div class="mode-badge">3단계 오답 조립 중</div><button id="all">전체 문제로 돌아가기</button>':''}<div class="hint">${st.index+1} / ${st.pool.length}</div><div class="question-card"><div class="meaning-line"><span class="meaning-text">${w.meaningKo}</span><button class="tiny-speak-button" aria-label="발음 듣기">🔊</button></div><div class="pos-text">${w.partOfSpeechKo}</div></div><div class="answer-box">${st.picked.join('')||'_'}</div><div class="letter-bank-row">${st.letters.map(l=>`<button class="letter-tile" data-i="${l.i}" ${st.used.includes(l.i)||st.locked?'disabled':''}>${l.ch}</button>`).join('')}</div><div class="feedback ${st.ok?'ok':st.done?'bad':''}">${st.message||''}</div><div class="assemble-actions"><button id="back">지우기</button><button id="clear">초기화</button><button id="assembleReview" ${reviewWords('stage3').length?'':'disabled'}>3단계 오답만 다시 조립하기</button><button id="nextA">다음 카드</button></div>${stageResultsHTML()}`;$('.tiny-speak-button').onclick=e=>speakWord(w.speakText||w.word,e);document.querySelectorAll('.letter-tile').forEach(b=>b.onclick=()=>{const l=st.letters.find(x=>x.i==b.dataset.i);st.picked.push(l.ch);st.used.push(l.i);st.message='';if(st.picked.length===cleanWord(w).length)gradeAssemble();else renderAssemble()});$('#back').onclick=()=>{if(st.locked)return;st.picked.pop();st.used.pop();st.done=false;st.message='';renderAssemble()};$('#clear').onclick=()=>{if(st.locked)return;st.picked=[];st.used=[];st.done=false;st.message='';renderAssemble()};$('#nextA').onclick=()=>{st.index++;if(st.index>=st.pool.length){if(!st.review)setScore('stage3',st.score,st.pool.length);result(st.review?'3단계 오답 복습':'알파벳 조립',st,true)}else{prepLetters();renderAssemble()}};$('#assembleReview').onclick=startAssembleReview;const all=$('#all');if(all)all.onclick=()=>{resetMode();mode='assemble';render()};bindReset()}
function result(name,st,assemble=false){const total=st.pool.length||1,wrong=st.wrong.length,rate=pctVal(st.score,total);content.innerHTML=`<h2>${name} 완료!</h2><div class="stats"><span class="pill">정답 ${st.score}</span><span class="pill">오답 ${wrong}</span><span class="pill">정답률 ${rate}%</span></div><h3>틀린 단어</h3><div class="review-list">${wrong?st.wrong.map(w=>`<div class="review-item"><strong>${w.word}</strong><span>${w.meaningKo} · ${w.partOfSpeechKo}</span></div>`).join(''):'<p class="hint">틀린 단어가 없어요!</p>'}</div><p><button class="primary" id="retry" ${wrong?'':'disabled'}>${assemble?'틀린 단어만 다시 조립하기':'틀린 단어만 다시 풀기'}</button></p>${stageResultsHTML()}`;$('#retry').onclick=()=>assemble?(assembleState={index:0,score:0,wrong:[],picked:[],used:[],done:false,pool:st.wrong,letters:[],review:true,recorded:{},locked:false,message:''},prepLetters(),renderAssemble()):(choiceState={index:0,score:0,wrong:[],answered:false,pool:st.wrong,review:true,recorded:{}},renderChoice());bindReset()}
function closeMenu(){$('#sidebar').classList.remove('open');$('#overlay').classList.remove('open')}$('#menuBtn').onclick=()=>{$('#sidebar').classList.add('open');$('#overlay').classList.add('open')};$('#overlay').onclick=closeMenu;$('#themeBtn').onclick=()=>{const dark=document.documentElement.dataset.theme==='dark';document.documentElement.dataset.theme=dark?'':'dark'};$('#copyBtn').onclick=async()=>{const url=PUBLIC_URL||location.href;await navigator.clipboard?.writeText(url).catch(()=>{});$('#notice').textContent='링크가 복사되었습니다.';setTimeout(()=>$('#notice').textContent='',2200)};document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;resetMode();render()});
fetch('quizData.json').then(r=>r.json()).then(j=>{data=j;currentSet=data.sets[0];resetMode();render()}).catch(e=>{content.innerHTML=`<p class="feedback bad">quizData.json 파싱 오류: ${e.message}</p>`});
</script>
</body>
</html>
